<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Stats preview card component</title>

  <link href="styles.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
  <main>
    <section class="stats-preview-card">
          <picture>
            <source
              media="(max-width: 375px)"
              srcset="./images/image-header-mobile.png"
            />
            <source
              media="(max-width: 1439px)"
              srcset="./images/image-header-tablet.png"
            />
            <img 
              class="stats-preview-card_img"
              src="./images/image-header-desktop.png"
              alt=""
            />
          </picture>
      <div class="stats-preview-card_content">
        <h1>Get <span class="purple-500">insights</span> that help your business grow.</h1>
        <p>Discover the benefits of data analytics and make better decisions regarding revenue, customer 
        experience, and overall efficiency.</p>
        <dl class="company-stats">
          <div>
            <dt>10k+</dt>
            <dd>companies</dd>
          </div>
          <div>
            <dt>314</dt> 
            <dd>templates</dd>
          </div>
          
          <div>
            <dt>12m+</dt>
            <dd>queries</dd>
          </div>
        </dl>
      </div>
    </section>
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Mellow</a>.
  </footer>
</body>
</html>
